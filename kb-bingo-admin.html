<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>KB BINGO — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Syne:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --y:#facc15; --bg:#030303; --s1:#0a0a0a; --s2:#111; --s3:#1a1a1a;
  --bdr:#222; --bdr2:#2e2e2e;
  --g:#22c55e; --r:#ef4444; --b:#38bdf8; --p:#a78bfa; --o:#fb923c;
  --tx:#f5f5f5; --tx2:#888; --tx3:#444;
  --font-head:'Orbitron',sans-serif;
  --font-body:'Syne',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --r8:8px; --r12:12px; --r50:50px;
  --shadow:0 8px 32px rgba(0,0,0,.6);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--font-body);background:var(--bg);color:var(--tx);display:flex;flex-direction:column;align-items:center;height:100dvh;}

/* SCREENS */
.screen{display:none;width:100%;height:100dvh;flex-direction:column;align-items:center;}
.screen.active{display:flex;}

/* LOGIN */
#login-screen{justify-content:center;padding:24px;}
.login-box{
  width:100%;max-width:360px;
  background:var(--s1);border:1px solid var(--bdr2);
  border-radius:var(--r12);padding:28px 22px;
  display:flex;flex-direction:column;gap:16px;
}
.admin-logo{text-align:center;}
.admin-logo-text{font-family:var(--font-head);font-size:1.3rem;font-weight:900;color:var(--r);letter-spacing:2px;}
.admin-logo-sub{font-size:.6rem;color:var(--tx2);letter-spacing:3px;text-transform:uppercase;margin-top:4px;}
.field label{font-size:.58rem;color:var(--tx2);text-transform:uppercase;letter-spacing:1.5px;display:block;margin-bottom:4px;}
.finput{
  width:100%;background:var(--s2);border:1px solid var(--bdr2);border-radius:var(--r8);
  padding:11px 14px;font-size:.85rem;color:var(--tx);font-family:var(--font-body);
  outline:none;transition:border-color .15s;
}
.finput:focus{border-color:var(--r);}
.finput::placeholder{color:var(--tx3);}
.login-btn{
  width:100%;padding:13px;border:none;border-radius:var(--r8);
  font-weight:800;font-size:.85rem;font-family:var(--font-head);
  cursor:pointer;background:var(--r);color:#fff;letter-spacing:1px;transition:.12s;
}
.login-btn:active{transform:scale(.97);}
.auth-err{font-size:.7rem;color:var(--r);text-align:center;min-height:16px;}

/* MAIN LAYOUT */
#main-screen{overflow:hidden;}
/* Top header */
.adm-hdr{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:rgba(3,3,3,.95);
  border-bottom:1px solid var(--bdr);flex-shrink:0;
}
.adm-logo{font-family:var(--font-head);font-size:.85rem;font-weight:900;color:var(--r);letter-spacing:1px;}
.adm-badge{
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);
  color:var(--r);font-size:.58rem;font-weight:700;padding:3px 10px;border-radius:var(--r50);
}
.logout-btn{
  background:var(--s2);border:1px solid var(--bdr);color:var(--tx2);
  font-size:.6rem;padding:5px 10px;border-radius:var(--r8);cursor:pointer;
}

/* NAV TABS */
.adm-tabs{
  width:100%;display:flex;background:var(--s1);
  border-bottom:1px solid var(--bdr);flex-shrink:0;overflow-x:auto;
}
.adm-tab{
  flex:1;min-width:60px;padding:10px 6px;text-align:center;
  font-size:.58rem;font-weight:700;color:var(--tx2);cursor:pointer;
  border-bottom:2px solid transparent;transition:.15s;white-space:nowrap;
}
.adm-tab.active{color:var(--r);border-bottom-color:var(--r);}
.adm-tab .tab-badge{
  display:inline-block;background:var(--r);color:#fff;
  border-radius:var(--r50);font-size:.45rem;padding:1px 5px;
  margin-left:3px;vertical-align:middle;
}

/* CONTENT AREA */
.adm-content{flex:1;overflow-y:auto;width:100%;padding:12px 14px 20px;}

/* STATS CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px;}
.stat-card{
  background:var(--s2);border:1px solid var(--bdr);border-radius:var(--r12);
  padding:12px;display:flex;flex-direction:column;gap:4px;
}
.stat-card-val{font-family:var(--font-mono);font-size:1.3rem;font-weight:700;}
.stat-card-val.y{color:var(--y);}
.stat-card-val.g{color:var(--g);}
.stat-card-val.r{color:var(--r);}
.stat-card-val.b{color:var(--b);}
.stat-card-lbl{font-size:.58rem;color:var(--tx2);text-transform:uppercase;letter-spacing:1px;}
.stat-card-sub{font-size:.55rem;color:var(--tx3);margin-top:2px;}

/* SECTION LABEL */
.sec-lbl{font-size:.58rem;color:var(--tx2);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.refresh-btn{font-size:.6rem;color:var(--b);cursor:pointer;background:none;border:none;font-family:var(--font-body);}

/* CARDS LIST */
.card-list{display:flex;flex-direction:column;gap:8px;}
.adm-card{
  background:var(--s2);border:1px solid var(--bdr);border-radius:var(--r12);
  padding:12px;display:flex;flex-direction:column;gap:8px;
}
.adm-card-row{display:flex;align-items:center;justify-content:space-between;}
.adm-card-name{font-size:.8rem;font-weight:700;}
.adm-card-phone{font-size:.62rem;color:var(--tx2);font-family:var(--font-mono);}
.adm-card-bal{font-family:var(--font-mono);font-size:.85rem;font-weight:700;color:var(--y);}
.adm-card-date{font-size:.55rem;color:var(--tx3);}
.adm-card-type{font-size:.65rem;font-weight:700;}
.adm-card-amt{font-family:var(--font-mono);font-size:.8rem;font-weight:900;}
.adm-card-amt.plus{color:var(--g);}
.adm-card-amt.minus{color:var(--r);}
.adm-card-status{font-size:.55rem;padding:2px 8px;border-radius:var(--r50);font-weight:700;}
.adm-card-status.pend{background:rgba(251,191,36,.1);color:var(--y);border:1px solid rgba(251,191,36,.2);}
.adm-card-status.done{background:rgba(34,197,94,.1);color:var(--g);border:1px solid rgba(34,197,94,.2);}
.adm-card-status.rejected{background:rgba(239,68,68,.1);color:var(--r);border:1px solid rgba(239,68,68,.2);}

/* ACTION BUTTONS */
.btn-row{display:flex;gap:6px;margin-top:4px;}
.act-btn{
  flex:1;padding:8px;border:none;border-radius:var(--r8);
  font-size:.65rem;font-weight:800;cursor:pointer;transition:.12s;
  font-family:var(--font-body);
}
.act-btn:active{transform:scale(.96);}
.act-btn.approve{background:rgba(34,197,94,.15);color:var(--g);border:1px solid rgba(34,197,94,.25);}
.act-btn.reject{background:rgba(239,68,68,.1);color:var(--r);border:1px solid rgba(239,68,68,.2);}
.act-btn.primary{background:var(--y);color:#000;}
.act-btn.danger{background:var(--r);color:#fff;}

/* ADD BALANCE MODAL */
#modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;
  display:none;align-items:flex-end;justify-content:center;
}
#modal-overlay.open{display:flex;}
.modal-box{
  width:100%;max-width:500px;background:var(--s1);
  border:1px solid var(--bdr2);border-radius:16px 16px 0 0;
  padding:20px;display:flex;flex-direction:column;gap:12px;
}
.modal-title{font-size:.9rem;font-weight:800;display:flex;justify-content:space-between;align-items:center;}
.modal-close{cursor:pointer;color:var(--tx2);font-size:1.1rem;}
.modal-user{background:var(--s2);border-radius:var(--r8);padding:10px 12px;}
.modal-user-name{font-weight:700;font-size:.85rem;}
.modal-user-bal{font-size:.65rem;color:var(--tx2);margin-top:2px;font-family:var(--font-mono);}

/* GAME ROOMS */
.room-card{
  background:var(--s2);border:1px solid var(--bdr);border-radius:var(--r12);
  padding:12px;display:flex;flex-direction:column;gap:6px;
}
.room-status{font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:var(--r50);}
.room-status.waiting{background:rgba(251,191,36,.1);color:var(--y);}
.room-status.playing{background:rgba(34,197,94,.1);color:var(--g);}
.room-status.finished{background:rgba(255,255,255,.05);color:var(--tx3);}
.room-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:4px;}
.room-stat{background:var(--s1);border-radius:6px;padding:6px;text-align:center;}
.room-stat-val{font-family:var(--font-mono);font-size:.8rem;font-weight:700;color:var(--y);}
.room-stat-lbl{font-size:.5rem;color:var(--tx2);margin-top:1px;}

/* EMPTY STATE */
.empty{text-align:center;padding:32px 16px;color:var(--tx2);font-size:.8rem;}
.empty-icon{font-size:2rem;margin-bottom:8px;}

/* TOAST */
#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--s2);border:1px solid var(--bdr2);color:var(--tx);
  padding:10px 18px;border-radius:var(--r8);font-size:.72rem;font-weight:700;
  opacity:0;pointer-events:none;transition:all .22s;z-index:900;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px;}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:10px;}
.search-input{
  width:100%;background:var(--s2);border:1px solid var(--bdr2);border-radius:var(--r8);
  padding:9px 14px 9px 36px;font-size:.8rem;color:var(--tx);font-family:var(--font-body);outline:none;
}
.search-input::placeholder{color:var(--tx3);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:.85rem;}

/* USER ROLE BADGE */
.role-badge{font-size:.5rem;padding:2px 6px;border-radius:var(--r50);font-weight:700;}
.role-badge.admin{background:rgba(239,68,68,.15);color:var(--r);border:1px solid rgba(239,68,68,.2);}
.role-badge.user{background:rgba(255,255,255,.05);color:var(--tx2);border:1px solid var(--bdr);}
</style>
</head>
<body>
<div id="toast"></div>

<!-- ADD BALANCE MODAL -->
<div id="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">
      💰 ሂሳብ ጨምር
      <span class="modal-close" onclick="closeModal()">✕</span>
    </div>
    <div class="modal-user">
      <div class="modal-user-name" id="modal-uname">—</div>
      <div class="modal-user-bal" id="modal-ubal">ቀሪ ሂሳብ: 0.00 ETB</div>
    </div>
    <div class="field">
      <label>የሚጨመር መጠን (ETB)</label>
      <input class="finput" type="number" id="modal-amount" placeholder="100">
    </div>
    <div class="field">
      <label>ምክንያት / ማስታወሻ</label>
      <input class="finput" type="text" id="modal-note" placeholder="TeleBirr deposit confirmed">
    </div>
    <div class="btn-row">
      <button class="act-btn reject" onclick="closeModal()">ሰርዝ</button>
      <button class="act-btn primary" onclick="confirmAddBalance()">✓ ጨምር</button>
    </div>
  </div>
</div>

<!-- ════════════════════
     LOGIN SCREEN
════════════════════ -->
<div id="login-screen" class="screen active">
  <div class="login-box">
    <div class="admin-logo">
      <div class="admin-logo-text">⚡ ADMIN</div>
      <div style="font-family:'Orbitron',sans-serif;font-size:.7rem;color:var(--y);margin-top:4px;">KB BINGO</div>
      <div class="admin-logo-sub">Control Panel</div>
    </div>
    <div class="field">
      <label>Admin Password</label>
      <input class="finput" type="password" id="adm-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAdminLogin()">
    </div>
    <div class="auth-err" id="adm-err"></div>
    <button class="login-btn" onclick="doAdminLogin()">🔓 ግባ</button>
  </div>
</div>

<!-- ════════════════════
     MAIN SCREEN
════════════════════ -->
<div id="main-screen" class="screen">
  <div class="adm-hdr">
    <div>
      <div class="adm-logo">⚡ KB ADMIN</div>
    </div>
    <div class="adm-badge">ADMIN</div>
    <button class="logout-btn" onclick="doLogout()">ውጣ</button>
  </div>

  <!-- TABS -->
  <div class="adm-tabs">
    <div class="adm-tab active" id="tab-overview" onclick="switchTab('overview')">📊 Overview</div>
    <div class="adm-tab" id="tab-deposits" onclick="switchTab('deposits')">💰 Deposits <span class="tab-badge" id="dep-badge" style="display:none">0</span></div>
    <div class="adm-tab" id="tab-withdrawals" onclick="switchTab('withdrawals')">📤 Withdraw <span class="tab-badge" id="wit-badge" style="display:none">0</span></div>
    <div class="adm-tab" id="tab-users" onclick="switchTab('users')">👥 Users</div>
    <div class="adm-tab" id="tab-games" onclick="switchTab('games')">🎮 Games</div>
    <div class="adm-tab" id="tab-txs" onclick="switchTab('txs')">📋 All TX</div>
  </div>

  <!-- CONTENT -->
  <div class="adm-content" id="adm-content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL = 'https://ytdhyrcxazqutoxdrvwu.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl0ZGh5cmN4YXpxdXRveGRydnd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NzI1NzgsImV4cCI6MjA5NjE0ODU3OH0.uSYLvR71teccJIE3dZffeByZdr3QzukXxW8bGBOhIhU';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── ADMIN PASSWORD (change this to your own!) ──
const ADMIN_PASSWORD = 'KBAdmin2024!';

let currentTab = 'overview';
let modalUser  = null;
let allUsers   = [];

/* ══════════════════════════════════════════════
   AUTH
══════════════════════════════════════════════ */
function doAdminLogin(){
  const pass = document.getElementById('adm-pass').value;
  const err  = document.getElementById('adm-err');
  if(pass !== ADMIN_PASSWORD){
    err.textContent = 'ፓስወርዱ ትክክል አይደለም';
    document.getElementById('adm-pass').value = '';
    return;
  }
  sessionStorage.setItem('kb_admin', '1');
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('main-screen').classList.add('active');
  loadTab('overview');
  startAutoRefresh();
}

(function checkSession(){
  if(sessionStorage.getItem('kb_admin')==='1'){
    document.getElementById('login-screen').classList.remove('active');
    document.getElementById('main-screen').classList.add('active');
    loadTab('overview');
    startAutoRefresh();
  }
})();

function doLogout(){
  sessionStorage.removeItem('kb_admin');
  document.getElementById('main-screen').classList.remove('active');
  document.getElementById('login-screen').classList.add('active');
}

/* ══════════════════════════════════════════════
   TABS
══════════════════════════════════════════════ */
function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.adm-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  loadTab(tab);
}

async function loadTab(tab){
  const content = document.getElementById('adm-content');
  content.innerHTML = '<div class="empty"><div class="empty-icon">⏳</div>Loading...</div>';
  switch(tab){
    case 'overview':    await renderOverview(); break;
    case 'deposits':    await renderDeposits(); break;
    case 'withdrawals': await renderWithdrawals(); break;
    case 'users':       await renderUsers(); break;
    case 'games':       await renderGames(); break;
    case 'txs':         await renderAllTx(); break;
  }
}

/* ══════════════════════════════════════════════
   OVERVIEW
══════════════════════════════════════════════ */
async function renderOverview(){
  const [usersRes, txRes, roomsRes] = await Promise.all([
    sb.from('users').select('id,balance,total_won,games_played'),
    sb.from('transactions').select('type,amount,status,created_at'),
    sb.from('rooms').select('status,stake,player_count,prize_pool'),
  ]);

  const users    = usersRes.data || [];
  const txs      = txRes.data    || [];
  const rooms    = roomsRes.data || [];

  const totalUsers    = users.length;
  const totalBalance  = users.reduce((s,u)=>s+(u.balance||0), 0);
  const totalDeposits = txs.filter(t=>t.type==='dep').reduce((s,t)=>s+(t.amount||0), 0);
  const totalWins     = txs.filter(t=>t.type==='win').reduce((s,t)=>s+(t.amount||0), 0);
  const activeRooms   = rooms.filter(r=>r.status==='playing').length;
  const pendingWit    = txs.filter(t=>t.type==='wit'&&t.status==='pending').length;
  const pendingDep    = txs.filter(t=>t.type==='dep'&&t.status==='pending').length;

  // Update badges
  const wb = document.getElementById('wit-badge');
  const db = document.getElementById('dep-badge');
  if(pendingWit > 0){ wb.textContent=pendingWit; wb.style.display='inline-block'; }
  if(pendingDep > 0){ db.textContent=pendingDep; db.style.display='inline-block'; }

  // Recent activity
  const recent = [...txs].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,5);

  document.getElementById('adm-content').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-card-val b">${totalUsers}</div>
        <div class="stat-card-lbl">👥 ተጠቃሚዎች</div>
        <div class="stat-card-sub">ጠቅላላ ተመዝጋቢዎች</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-val y">${fmt(totalBalance)} ETB</div>
        <div class="stat-card-lbl">💳 ጠቅላላ ሂሳብ</div>
        <div class="stat-card-sub">በሁሉም አካዉንቶች</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-val g">${fmt(totalDeposits)} ETB</div>
        <div class="stat-card-lbl">💰 ጠቅላላ Deposit</div>
        <div class="stat-card-sub">ከጀምሮ ድረስ</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-val r">${fmt(totalWins)} ETB</div>
        <div class="stat-card-lbl">🏆 ጠቅላላ Wins</div>
        <div class="stat-card-sub">ለተጫዋቾች ተከፍሏል</div>
      </div>
    </div>

    ${pendingWit>0 ? `
    <div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:12px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-size:.75rem;font-weight:800;color:var(--r);">⚠️ ${pendingWit} Withdrawal ይጠብቃሉ!</div>
        <div style="font-size:.6rem;color:var(--tx2);margin-top:2px;">TeleBirr ይላኩ ከዚያ Approve ያድርጉ</div>
      </div>
      <button class="act-btn danger" style="flex:none;width:auto;padding:8px 14px;" onclick="switchTab('withdrawals')">አሁን ይፈቅዱ →</button>
    </div>` : ''}

    ${pendingDep>0 ? `
    <div style="background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);border-radius:10px;padding:12px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-size:.75rem;font-weight:800;color:var(--y);">💰 ${pendingDep} Deposit ይጠብቃሉ!</div>
        <div style="font-size:.6rem;color:var(--tx2);margin-top:2px;">TeleBirr ያረጋግጡ ከዚያ ያጽድቁ</div>
      </div>
      <button class="act-btn primary" style="flex:none;width:auto;padding:8px 14px;" onclick="switchTab('deposits')">አሁን ያጽድቁ →</button>
    </div>` : ''}

    <div class="sec-lbl">
      Active Games
      <span style="color:var(--g);font-family:'JetBrains Mono',monospace;font-size:.65rem;">${activeRooms} live</span>
    </div>
    <div style="background:var(--s2);border:1px solid var(--bdr);border-radius:10px;padding:12px;margin-bottom:14px;">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
        ${[10,20,50,100].map(s=>{
          const r=rooms.find(rm=>rm.stake===s&&rm.status==='playing');
          return `<div style="text-align:center;background:var(--s1);border-radius:6px;padding:8px;">
            <div style="font-family:'JetBrains Mono',monospace;font-size:.9rem;font-weight:700;color:var(--y);">${s}</div>
            <div style="font-size:.5rem;color:var(--tx2);">ETB</div>
            <div style="font-size:.65rem;color:${r?'var(--g)':'var(--tx3)'};margin-top:4px;">${r?r.player_count+' players':'idle'}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="sec-lbl">የቅርብ ጊዜ እንቅስቃሴ</div>
    <div class="card-list">
      ${recent.map(t=>recentTxHTML(t)).join('') || '<div class="empty">ምንም አልተደረገም</div>'}
    </div>
  `;
}

/* ══════════════════════════════════════════════
   DEPOSITS
══════════════════════════════════════════════ */
async function renderDeposits(){
  const {data:txs} = await sb.from('transactions')
    .select('*,users(name,phone)')
    .eq('type','dep')
    .order('created_at',{ascending:false})
    .limit(50);

  const pending  = (txs||[]).filter(t=>t.status==='pending');
  const done     = (txs||[]).filter(t=>t.status!=='pending');

  document.getElementById('adm-content').innerHTML = `
    ${pending.length>0 ? `
    <div class="sec-lbl" style="color:var(--y);">⏳ ያልተፈቀዱ Deposits (${pending.length})</div>
    <div class="card-list" style="margin-bottom:16px;">
      ${pending.map(t=>depositCardHTML(t,true)).join('')}
    </div>` : `
    <div style="background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.12);border-radius:10px;padding:12px;margin-bottom:14px;text-align:center;font-size:.75rem;color:var(--g);">
      ✅ ምንም ያልተፈቀዱ Deposits የሉም
    </div>`}
    <div class="sec-lbl">ታሪክ (${done.length})</div>
    <div class="card-list">
      ${done.map(t=>depositCardHTML(t,false)).join('') || '<div class="empty">ምንም የለም</div>'}
    </div>
  `;
}

function depositCardHTML(t, isPending){
  const u = t.users||{};
  const date = t.created_at ? new Date(t.created_at).toLocaleString('en',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
  return `<div class="adm-card">
    <div class="adm-card-row">
      <div>
        <div class="adm-card-name">${u.name||'Unknown'}</div>
        <div class="adm-card-phone">${u.phone||'—'}</div>
      </div>
      <div style="text-align:right;">
        <div class="adm-card-amt plus">+${(t.amount||0).toLocaleString()} ETB</div>
        <div class="adm-card-date">${date}</div>
      </div>
    </div>
    ${t.label?`<div style="font-size:.62rem;color:var(--tx2);">📝 ${t.label}</div>`:''}
    <div class="adm-card-row">
      <span class="adm-card-status ${t.status==='completed'?'done':t.status==='rejected'?'rejected':'pend'}">${t.status==='completed'?'✓ Approved':t.status==='rejected'?'✗ Rejected':'⏳ Pending'}</span>
      ${isPending ? `<div class="btn-row" style="margin:0;">
        <button class="act-btn reject" onclick="rejectTx('${t.id}','${u.name||''}')">✗ Reject</button>
        <button class="act-btn approve" onclick="approveDeposit('${t.id}','${t.user_id}',${t.amount},'${u.name||''}')">✓ Approve</button>
      </div>` : ''}
    </div>
  </div>`;
}

async function approveDeposit(txId, userId, amount, name){
  if(!confirm(`${name}ን ${amount} ETB Approve ያድርጉ?`)) return;
  // Update tx status
  await sb.from('transactions').update({status:'completed'}).eq('id',txId);
  // Credit user balance
  const {data:user} = await sb.from('users').select('balance').eq('id',userId).single();
  const newBal = (user?.balance||0) + amount;
  await sb.from('users').update({balance:newBal}).eq('id',userId);
  showToast('✅ Approved! +'+amount+' ETB to '+name);
  renderDeposits();
  renderOverview();
}

/* ══════════════════════════════════════════════
   WITHDRAWALS
══════════════════════════════════════════════ */
async function renderWithdrawals(){
  const {data:txs} = await sb.from('transactions')
    .select('*,users(name,phone,balance)')
    .eq('type','wit')
    .order('created_at',{ascending:false})
    .limit(50);

  const pending = (txs||[]).filter(t=>t.status==='pending');
  const done    = (txs||[]).filter(t=>t.status!=='pending');

  document.getElementById('adm-content').innerHTML = `
    ${pending.length>0 ? `
    <div class="sec-lbl" style="color:var(--r);">⚠️ ያልተሰሩ Withdrawals (${pending.length})</div>
    <div class="card-list" style="margin-bottom:16px;">
      ${pending.map(t=>withdrawCardHTML(t,true)).join('')}
    </div>` : `
    <div style="background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.12);border-radius:10px;padding:12px;margin-bottom:14px;text-align:center;font-size:.75rem;color:var(--g);">
      ✅ ሁሉም Withdrawals ተፈጽሟል
    </div>`}
    <div class="sec-lbl">ታሪክ (${done.length})</div>
    <div class="card-list">
      ${done.map(t=>withdrawCardHTML(t,false)).join('') || '<div class="empty">ምንም የለም</div>'}
    </div>
  `;
}

function withdrawCardHTML(t, isPending){
  const u = t.users||{};
  const date = t.created_at ? new Date(t.created_at).toLocaleString('en',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
  const amt = Math.abs(t.amount||0);
  return `<div class="adm-card" style="${isPending?'border-color:rgba(239,68,68,.3);':''}">
    <div class="adm-card-row">
      <div>
        <div class="adm-card-name">${u.name||'Unknown'}</div>
        <div class="adm-card-phone">${u.phone||'—'}</div>
        <div style="font-size:.55rem;color:var(--tx2);margin-top:2px;">ቀሪ ሂሳብ: ${fmt(u.balance||0)} ETB</div>
      </div>
      <div style="text-align:right;">
        <div class="adm-card-amt minus">-${amt.toLocaleString()} ETB</div>
        <div class="adm-card-date">${date}</div>
      </div>
    </div>
    ${t.label?`<div style="background:var(--s1);border-radius:6px;padding:6px 8px;font-size:.62rem;color:var(--b);font-family:'JetBrains Mono',monospace;">📱 ${t.label}</div>`:''}
    ${isPending ? `
    <div style="background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.1);border-radius:6px;padding:8px;font-size:.65rem;color:#aaa;">
      1. TeleBirr ከፍተው ${amt} ETB ወደ ${t.label||'ቁጥሩ'} ይላኩ<br>
      2. ከዚያ "Mark Sent" ይጫኑ
    </div>
    <div class="btn-row">
      <button class="act-btn reject" onclick="rejectTx('${t.id}','${u.name||''}',${amt},'${u.id||''}')">✗ Reject</button>
      <button class="act-btn approve" onclick="markWithdrawSent('${t.id}','${u.name||''}',${amt})">✓ Mark Sent</button>
    </div>` :
    `<span class="adm-card-status ${t.status==='completed'?'done':t.status==='rejected'?'rejected':'pend'}">${t.status==='completed'?'✓ Sent':t.status==='rejected'?'✗ Rejected':'⏳ Pending'}</span>`}
  </div>`;
}

async function markWithdrawSent(txId, name, amount){
  if(!confirm(name+'ን '+amount+' ETB ልኳል ብለው ያረጋግጡ?')) return;
  await sb.from('transactions').update({status:'completed'}).eq('id',txId);
  showToast('✅ '+name+' — '+amount+' ETB ተልኳል!');
  renderWithdrawals();
}

async function rejectTx(txId, name, amount, userId){
  if(!confirm(name+'ን Reject ያድርጉ?')) return;
  await sb.from('transactions').update({status:'rejected'}).eq('id',txId);
  // If withdrawal, refund the balance
  if(amount && userId){
    const {data:user} = await sb.from('users').select('balance').eq('id',userId).single();
    if(user){
      await sb.from('users').update({balance:(user.balance||0)+amount}).eq('id',userId);
      await sb.from('transactions').insert({user_id:userId,type:'bon',amount:amount,label:'Withdrawal refunded',status:'completed'});
    }
  }
  showToast('✗ Rejected — '+name);
  loadTab(currentTab);
}

/* ══════════════════════════════════════════════
   USERS
══════════════════════════════════════════════ */
async function renderUsers(){
  const {data} = await sb.from('users').select('*').order('created_at',{ascending:false});
  allUsers = data||[];

  document.getElementById('adm-content').innerHTML = `
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="user-search" placeholder="ስም ወይም ስልክ ይፈልጉ..." oninput="filterUsers()">
    </div>
    <div class="sec-lbl">${allUsers.length} ተጠቃሚዎች <button class="refresh-btn" onclick="renderUsers()">↻ Refresh</button></div>
    <div class="card-list" id="users-list">
      ${allUsers.map(u=>userCardHTML(u)).join('')}
    </div>
  `;
}

function filterUsers(){
  const q = document.getElementById('user-search').value.toLowerCase();
  const filtered = allUsers.filter(u => (u.name||'').toLowerCase().includes(q) || (u.phone||'').includes(q));
  document.getElementById('users-list').innerHTML = filtered.map(u=>userCardHTML(u)).join('') || '<div class="empty">አልተገኘም</div>';
}

function userCardHTML(u){
  const date = u.created_at ? new Date(u.created_at).toLocaleDateString('en',{month:'short',day:'numeric',year:'numeric'}) : '';
  return `<div class="adm-card">
    <div class="adm-card-row">
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--y),#854d0e);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.9rem;color:#000;flex-shrink:0;">${(u.name||'?')[0].toUpperCase()}</div>
        <div>
          <div class="adm-card-name" style="display:flex;align-items:center;gap:6px;">
            ${u.name||'—'}
            <span class="role-badge ${u.role==='admin'?'admin':'user'}">${u.role||'user'}</span>
          </div>
          <div class="adm-card-phone">${u.phone||'—'}</div>
        </div>
      </div>
      <div style="text-align:right;">
        <div class="adm-card-bal">${fmt(u.balance||0)} ETB</div>
        <div class="adm-card-date">${date}</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;">
      <div style="background:var(--s1);border-radius:6px;padding:5px;text-align:center;">
        <div style="font-size:.7rem;font-weight:700;color:var(--b);">${u.games_played||0}</div>
        <div style="font-size:.48rem;color:var(--tx2);">Games</div>
      </div>
      <div style="background:var(--s1);border-radius:6px;padding:5px;text-align:center;">
        <div style="font-size:.7rem;font-weight:700;color:var(--g);">${fmt(u.total_won||0)}</div>
        <div style="font-size:.48rem;color:var(--tx2);">Won ETB</div>
      </div>
      <div style="background:var(--s1);border-radius:6px;padding:5px;text-align:center;">
        <div style="font-size:.7rem;font-weight:700;color:var(--y);">${fmt(u.balance||0)}</div>
        <div style="font-size:.48rem;color:var(--tx2);">Balance</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="act-btn approve" onclick="openAddBalance('${u.id}','${u.name||''}',${u.balance||0})">💰 ሂሳብ ጨምር</button>
      <button class="act-btn reject" onclick="deductBalance('${u.id}','${u.name||''}',${u.balance||0})">➖ ሂሳብ ቀንስ</button>
    </div>
  </div>`;
}

/* ══════════════════════════════════════════════
   ADD / DEDUCT BALANCE
══════════════════════════════════════════════ */
function openAddBalance(userId, name, balance){
  modalUser = {id:userId, name, balance};
  document.getElementById('modal-uname').textContent = name;
  document.getElementById('modal-ubal').textContent  = 'ቀሪ ሂሳብ: '+fmt(balance)+' ETB';
  document.getElementById('modal-amount').value = '';
  document.getElementById('modal-note').value   = 'Manual deposit confirmed';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  modalUser = null;
}
async function confirmAddBalance(){
  if(!modalUser) return;
  const amt  = parseFloat(document.getElementById('modal-amount').value);
  const note = document.getElementById('modal-note').value || 'Admin credit';
  if(!amt||amt<=0){ showToast('⚠️ መጠን ያስገቡ'); return; }
  const newBal = (modalUser.balance||0) + amt;
  await sb.from('users').update({balance:newBal}).eq('id',modalUser.id);
  await sb.from('transactions').insert({user_id:modalUser.id, type:'dep', amount:amt, label:'Admin: '+note, status:'completed'});
  showToast('✅ +'+amt+' ETB → '+modalUser.name);
  closeModal();
  renderUsers();
}

async function deductBalance(userId, name, balance){
  const amt = parseFloat(prompt('ከ '+name+' ምን ያህል ETB ይቀንሱ?')||'0');
  if(!amt||amt<=0) return;
  if(amt>balance){ showToast('⚠️ ከሂሳቡ በላይ ነው'); return; }
  const newBal = balance - amt;
  await sb.from('users').update({balance:newBal}).eq('id',userId);
  await sb.from('transactions').insert({user_id:userId, type:'wit', amount:-amt, label:'Admin deduction', status:'completed'});
  showToast('✅ -'+amt+' ETB from '+name);
  renderUsers();
}

/* ══════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════ */
function recentTxHTML(t){
  const icons={dep:'💰',wit:'📤',win:'🏆',bet:'🎲',bon:'🎁'};
  const plus = t.amount>0;
  const date = t.created_at ? new Date(t.created_at).toLocaleString('en',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
  return `<div class="adm-card" style="padding:10px 12px;">
    <div class="adm-card-row">
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:1rem;">${icons[t.type]||'❓'}</span>
        <div>
          <div style="font-size:.7rem;font-weight:700;">${t.label||t.type}</div>
          <div style="font-size:.55rem;color:var(--tx2);">${date}</div>
        </div>
      </div>
      <div class="adm-card-amt ${plus?'plus':'minus'}">${plus?'+':''}${(t.amount||0).toLocaleString()} ETB</div>
    </div>
  </div>`;
}

function fmt(n){ return (n||0).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// Auto refresh every 30 seconds
function startAutoRefresh(){
  setInterval(()=>{ if(currentTab==='overview'||currentTab==='withdrawals'||currentTab==='deposits') loadTab(currentTab); }, 30000);
}
</script>
