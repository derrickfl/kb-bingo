<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>KB BINGO — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Chakra+Petch:wght@500;600;700&family=Noto+Sans+Ethiopic:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --y:#FFD700;--bg:#090909;--card:#161616;--card2:#1e1e1e;
  --bdr:#242424;--bdr2:#2e2e2e;
  --g:#00ff66;--r:#ff3344;--b:#38bdf8;--p:#a78bfa;--o:#fb923c;
  --tx:#ffffff;--tx2:#999;--tx3:#555;
  --font-head:'Orbitron',sans-serif;
  --font-body:'Noto Sans Ethiopic',sans-serif;
  --font-tech:'Chakra Petch',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font-body);color:var(--tx)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

/* ── LOGIN ─────────────────────────────────────── */
#login-screen{display:flex;align-items:center;justify-content:center;height:100dvh;padding:24px;background:var(--bg)}
.login-wrap{width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:28px}
.login-logo{display:flex;flex-direction:column;align-items:center;gap:10px}
.login-icon{width:72px;height:72px;background:var(--r);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:2rem;box-shadow:0 0 40px rgba(255,51,68,.35);animation:loginPulse 2s ease-in-out infinite}
@keyframes loginPulse{0%,100%{box-shadow:0 0 20px rgba(255,51,68,.3)}50%{box-shadow:0 0 50px rgba(255,51,68,.6)}}
.login-title{font-family:var(--font-head);font-size:1.5rem;font-weight:900;color:var(--r);letter-spacing:2px}
.login-sub{font-size:.65rem;color:var(--tx3);letter-spacing:3px;text-transform:uppercase}
.login-box{width:100%;background:var(--card);border:1px solid var(--bdr2);border-radius:18px;padding:24px 20px;display:flex;flex-direction:column;gap:14px}
.field label{font-size:.6rem;color:var(--tx2);text-transform:uppercase;letter-spacing:1.5px;display:block;margin-bottom:5px;font-family:var(--font-tech)}
.finput{width:100%;background:var(--card2);border:1.5px solid var(--bdr2);border-radius:10px;padding:12px 14px;font-size:.9rem;color:var(--tx);font-family:var(--font-tech);outline:none;transition:border-color .2s}
.finput:focus{border-color:var(--r)}
.finput::placeholder{color:var(--tx3)}
.login-btn{width:100%;padding:14px;border:none;border-radius:12px;font-weight:800;font-size:.9rem;font-family:var(--font-head);cursor:pointer;background:var(--r);color:#fff;letter-spacing:1px;transition:.15s;box-shadow:0 4px 20px rgba(255,51,68,.3)}
.login-btn:active{transform:scale(.97)}
.auth-err{font-size:.7rem;color:var(--r);text-align:center;min-height:16px;font-weight:600}

/* ── MAIN LAYOUT ───────────────────────────────── */
#main-screen{display:none;flex-direction:column;height:100dvh;width:100%}
#main-screen.active{display:flex}

/* ── HEADER ────────────────────────────────────── */
.adm-hdr{width:100%;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg);border-bottom:1px solid var(--bdr);flex-shrink:0;z-index:50}
.adm-hdr-l{display:flex;align-items:center;gap:10px}
.adm-kb{background:var(--r);color:#fff;font-family:var(--font-head);font-size:.7rem;font-weight:900;padding:4px 8px;border-radius:6px;letter-spacing:.5px}
.adm-title{font-family:var(--font-head);font-size:1rem;font-weight:900;color:var(--tx);letter-spacing:1px}
.adm-hdr-r{display:flex;align-items:center;gap:8px}
.live-pill{display:flex;align-items:center;gap:5px;background:rgba(0,255,102,.08);border:1px solid rgba(0,255,102,.2);border-radius:50px;padding:5px 11px;font-size:.6rem;font-weight:700;color:var(--g);font-family:var(--font-tech)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--g);animation:ldot 1.4s ease-in-out infinite}
@keyframes ldot{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,255,102,.5)}50%{opacity:.6;box-shadow:0 0 0 4px rgba(0,255,102,0)}}
.hdr-logout{background:var(--card);border:1px solid var(--bdr);color:var(--tx2);font-size:.6rem;font-weight:700;padding:6px 12px;border-radius:8px;cursor:pointer;font-family:var(--font-tech);transition:.15s}
.hdr-logout:active{background:var(--card2)}

/* ── TABS ──────────────────────────────────────── */
.adm-tabs{width:100%;display:flex;background:var(--card);border-bottom:1px solid var(--bdr);flex-shrink:0;overflow-x:auto}
.adm-tabs::-webkit-scrollbar{display:none}
.adm-tab{flex:1;min-width:55px;padding:11px 4px;text-align:center;font-size:.55rem;font-weight:700;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap;font-family:var(--font-tech);letter-spacing:.5px;display:flex;flex-direction:column;align-items:center;gap:3px}
.adm-tab:active{background:var(--card2)}
.adm-tab.active{color:var(--y);border-bottom-color:var(--y)}
.tab-icon{font-size:.9rem}
.tab-badge{display:inline-block;background:var(--r);color:#fff;border-radius:50px;font-size:.42rem;padding:1px 5px;font-family:var(--font-tech);font-weight:800;margin-top:1px}

/* ── CONTENT ───────────────────────────────────── */
.adm-content{flex:1;overflow-y:auto;width:100%;padding:14px 14px 28px}

/* ── STAT CARDS ────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:14px 12px;display:flex;flex-direction:column;gap:6px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;inset:0;opacity:.04;border-radius:14px}
.stat-card.y::before{background:var(--y)}.stat-card.g::before{background:var(--g)}.stat-card.r::before{background:var(--r)}.stat-card.b::before{background:var(--b)}
.stat-icon{font-size:1.4rem;margin-bottom:2px}
.stat-val{font-family:var(--font-tech);font-size:1.25rem;font-weight:700;line-height:1}
.stat-val.y{color:var(--y)}.stat-val.g{color:var(--g)}.stat-val.r{color:var(--r)}.stat-val.b{color:var(--b)}
.stat-lbl{font-size:.58rem;color:var(--tx2);text-transform:uppercase;letter-spacing:1px;font-family:var(--font-tech)}
.stat-sub{font-size:.52rem;color:var(--tx3);margin-top:1px}

/* ── SECTION LABEL ─────────────────────────────── */
.sec-lbl{font-size:.6rem;color:var(--tx2);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;font-family:var(--font-tech)}
.refresh-btn{font-size:.65rem;color:var(--b);cursor:pointer;background:none;border:none;font-family:var(--font-tech);font-weight:700;display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;transition:.15s}
.refresh-btn:active{background:var(--card2)}

/* ── CARDS ─────────────────────────────────────── */
.card-list{display:flex;flex-direction:column;gap:10px}
.adm-card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:13px;display:flex;flex-direction:column;gap:10px;transition:.15s}
.adm-card-row{display:flex;align-items:center;justify-content:space-between}
.adm-card-name{font-size:.82rem;font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.adm-card-phone{font-size:.62rem;color:var(--tx2);font-family:var(--font-tech);margin-top:2px}
.adm-card-bal{font-family:var(--font-tech);font-size:.88rem;font-weight:700;color:var(--y)}
.adm-card-date{font-size:.55rem;color:var(--tx3);margin-top:2px}
.adm-card-amt{font-family:var(--font-tech);font-size:.85rem;font-weight:900}
.adm-card-amt.plus{color:var(--g)}.adm-card-amt.minus{color:var(--r)}
.adm-card-status{font-size:.55rem;padding:3px 9px;border-radius:50px;font-weight:700;font-family:var(--font-tech)}
.adm-card-status.pend{background:rgba(255,215,0,.1);color:var(--y);border:1px solid rgba(255,215,0,.25)}
.adm-card-status.done{background:rgba(0,255,102,.1);color:var(--g);border:1px solid rgba(0,255,102,.25)}
.adm-card-status.rejected{background:rgba(255,51,68,.1);color:var(--r);border:1px solid rgba(255,51,68,.2)}

/* ── BUTTONS ───────────────────────────────────── */
.btn-row{display:flex;gap:8px;margin-top:2px}
.act-btn{flex:1;padding:9px 8px;border:none;border-radius:10px;font-size:.65rem;font-weight:800;cursor:pointer;transition:.15s;font-family:var(--font-body)}
.act-btn:active{transform:scale(.96)}
.act-btn.approve{background:rgba(0,255,102,.12);color:var(--g);border:1px solid rgba(0,255,102,.25)}
.act-btn.reject{background:rgba(255,51,68,.1);color:var(--r);border:1px solid rgba(255,51,68,.2)}
.act-btn.primary{background:var(--y);color:#000;font-weight:900}
.act-btn.danger{background:var(--r);color:#fff}
.act-btn.blue{background:rgba(56,189,248,.12);color:var(--b);border:1px solid rgba(56,189,248,.25)}
.act-btn.purple{background:rgba(167,139,250,.12);color:var(--p);border:1px solid rgba(167,139,250,.25)}
.act-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}

/* ── BADGES ────────────────────────────────────── */
.tg-badge{font-size:.42rem;padding:2px 5px;border-radius:4px;background:rgba(34,158,217,.15);color:#229ED9;border:1px solid rgba(34,158,217,.3);font-weight:700;font-family:var(--font-tech)}
.role-badge{font-size:.48rem;padding:2px 6px;border-radius:50px;font-weight:700;font-family:var(--font-tech)}
.role-badge.admin{background:rgba(255,51,68,.15);color:var(--r);border:1px solid rgba(255,51,68,.25)}
.role-badge.user{background:rgba(255,255,255,.05);color:var(--tx2);border:1px solid var(--bdr)}
.room-status-badge{font-size:.58rem;font-weight:700;padding:3px 9px;border-radius:50px;font-family:var(--font-tech)}
.room-status-badge.waiting{background:rgba(255,215,0,.1);color:var(--y);border:1px solid rgba(255,215,0,.25)}
.room-status-badge.playing{background:rgba(0,255,102,.1);color:var(--g);border:1px solid rgba(0,255,102,.25)}
.room-status-badge.finished{background:rgba(255,255,255,.04);color:var(--tx3);border:1px solid var(--bdr)}

/* ── ALERT BANNERS ─────────────────────────────── */
.alert-banner{border-radius:12px;padding:13px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.alert-banner.warn{background:rgba(255,51,68,.07);border:1px solid rgba(255,51,68,.2)}
.alert-banner.info{background:rgba(255,215,0,.07);border:1px solid rgba(255,215,0,.2)}
.alert-banner.success{background:rgba(0,255,102,.06);border:1px solid rgba(0,255,102,.15)}
.ab-text{font-size:.75rem;font-weight:800;margin-bottom:2px}
.ab-sub{font-size:.6rem;color:var(--tx2)}

/* ── MODAL ─────────────────────────────────────── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;display:none;align-items:flex-end;justify-content:center}
#modal-overlay.open{display:flex}
.modal-box{width:100%;max-width:480px;background:var(--card);border:1px solid var(--bdr2);border-radius:20px 20px 0 0;padding:22px 18px;display:flex;flex-direction:column;gap:14px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:.92rem;font-weight:800;display:flex;justify-content:space-between;align-items:center;font-family:var(--font-head)}
.modal-close{cursor:pointer;color:var(--tx2);font-size:1.2rem;line-height:1;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:var(--card2)}
.modal-user{background:var(--card2);border-radius:12px;padding:12px 14px;border:1px solid var(--bdr)}
.modal-user-name{font-weight:700;font-size:.88rem}
.modal-user-bal{font-size:.65rem;color:var(--tx2);margin-top:3px;font-family:var(--font-tech)}

/* ── DANGER ZONE ───────────────────────────────── */
.danger-zone{background:rgba(255,51,68,.05);border:1px solid rgba(255,51,68,.2);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:10px}
.danger-title{font-family:var(--font-head);font-size:.75rem;font-weight:700;color:var(--r);display:flex;align-items:center;gap:6px}
.danger-desc{font-size:.72rem;color:var(--tx2);line-height:1.5}
.danger-btn{width:100%;padding:12px;border:1.5px solid var(--r);border-radius:10px;background:transparent;color:var(--r);font-family:var(--font-body);font-size:.8rem;font-weight:800;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.danger-btn:active{background:rgba(255,51,68,.1)}
.danger-btn.confirm{background:var(--r);color:#fff}

/* ── ROOMS GRID ────────────────────────────────── */
.room-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:4px}
.room-stat{background:var(--bg);border-radius:8px;padding:7px;text-align:center;border:1px solid var(--bdr)}
.room-stat-val{font-family:var(--font-tech);font-size:.82rem;font-weight:700;color:var(--y)}
.room-stat-lbl{font-size:.48rem;color:var(--tx3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* ── SEARCH ────────────────────────────────────── */
.search-wrap{position:relative;margin-bottom:12px}
.search-input{width:100%;background:var(--card2);border:1.5px solid var(--bdr2);border-radius:10px;padding:10px 14px 10px 36px;font-size:.82rem;color:var(--tx);font-family:var(--font-body);outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--y)}
.search-input::placeholder{color:var(--tx3)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:.85rem;pointer-events:none}

/* ── SMS CODE ──────────────────────────────────── */
.sms-code{background:rgba(56,189,248,.07);border:1px solid rgba(56,189,248,.18);border-radius:8px;padding:7px 11px;font-size:.65rem;color:var(--b);font-family:var(--font-tech);word-break:break-all}

/* ── TOAST ─────────────────────────────────────── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--bdr2);color:var(--tx);padding:11px 20px;border-radius:50px;font-size:.78rem;font-weight:700;opacity:0;pointer-events:none;transition:all .25s;z-index:900;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.6)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.empty{text-align:center;padding:36px 16px;color:var(--tx2);font-size:.82rem;display:flex;flex-direction:column;align-items:center;gap:8px}
.empty-icon{font-size:2.2rem}

/* ── STATS TABS FILTER ─────────────────────────── */
.filter-chips{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.filter-chips::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border-radius:50px;font-size:.68rem;font-weight:700;border:1px solid var(--bdr);background:var(--card);color:var(--tx2);cursor:pointer;white-space:nowrap;font-family:var(--font-tech);transition:.15s;flex-shrink:0}
.chip.active{background:var(--y);color:#000;border-color:var(--y)}
.chip:active{transform:scale(.95)}

/* ── USER AVATAR ───────────────────────────────── */
.uav{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.95rem;flex-shrink:0}

/* ── PROGRESS BAR ──────────────────────────────── */
.prog-bar-wrap{width:100%;height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;margin-top:4px}
.prog-bar-fill{height:100%;border-radius:3px;transition:width .5s}
</style>
</head>
<body>
<div id="toast"></div>

<!-- ══ ADD BALANCE MODAL ══════════════════════════ -->
<div id="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">💰 ሂሳብ ጨምር <span class="modal-close" onclick="closeModal()">✕</span></div>
    <div class="modal-user">
      <div class="modal-user-name" id="modal-uname">—</div>
      <div class="modal-user-bal" id="modal-ubal">ቀሪ ሂሳብ: 0.00 ETB</div>
    </div>
    <div class="field"><label>የሚጨመር መጠን (ETB)</label><input class="finput" type="number" id="modal-amount" placeholder="100"/></div>
    <div class="field"><label>ምክንያት / ማስታወሻ</label><input class="finput" type="text" id="modal-note" placeholder="TeleBirr deposit confirmed"/></div>
    <div class="btn-row">
      <button class="act-btn reject" onclick="closeModal()">ሰርዝ</button>
      <button class="act-btn primary" onclick="confirmAddBalance()">✓ ጨምር</button>
    </div>
  </div>
</div>

<!-- ══ DEDUCT BALANCE MODAL ══════════════════════ -->
<div id="deduct-modal-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;display:none;align-items:flex-end;justify-content:center">
  <div class="modal-box">
    <div class="modal-title">➖ ሂሳብ ቀንስ <span class="modal-close" onclick="closeDeductModal()">✕</span></div>
    <div class="modal-user">
      <div class="modal-user-name" id="deduct-uname">—</div>
      <div class="modal-user-bal" id="deduct-ubal">ቀሪ ሂሳብ: 0.00 ETB</div>
    </div>
    <div class="field"><label>የሚቀነስ መጠን (ETB)</label><input class="finput" type="number" id="deduct-amount" placeholder="100"/></div>
    <div class="field"><label>ምክንያት</label><input class="finput" type="text" id="deduct-note" placeholder="Admin deduction"/></div>
    <div class="btn-row">
      <button class="act-btn approve" onclick="closeDeductModal()">ሰርዝ</button>
      <button class="act-btn danger" onclick="confirmDeductBalance()">➖ ቀንስ</button>
    </div>
  </div>
</div>

<!-- ══ CONFIRM MODAL ══════════════════════════════ -->
<div id="confirm-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:600;display:none;align-items:center;justify-content:center;padding:20px">
  <div style="width:100%;max-width:340px;background:var(--card);border:1px solid var(--bdr2);border-radius:20px;padding:24px 20px;display:flex;flex-direction:column;gap:16px;animation:slideUp .2s ease">
    <div style="font-size:2.5rem;text-align:center" id="confirm-icon">⚠️</div>
    <div style="font-family:var(--font-head);font-size:.95rem;font-weight:700;text-align:center" id="confirm-title">Are you sure?</div>
    <div style="font-size:.78rem;color:var(--tx2);text-align:center;line-height:1.6" id="confirm-msg"></div>
    <div class="btn-row">
      <button class="act-btn approve" onclick="closeConfirm()">ሰርዝ</button>
      <button class="act-btn danger" id="confirm-ok-btn" onclick="">አዎ፣ ቀጥል</button>
    </div>
  </div>
</div>

<!-- ══ LOGIN ══════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="login-icon">⚡</div>
      <div class="login-title">KB ADMIN</div>
      <div class="login-sub">Control Panel</div>
    </div>
    <div class="login-box">
      <div class="field">
        <label>Admin Password</label>
        <input class="finput" type="password" id="adm-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAdminLogin()"/>
      </div>
      <div class="auth-err" id="adm-err"></div>
      <button class="login-btn" onclick="doAdminLogin()">🔓 ግባ</button>
    </div>
  </div>
</div>

<!-- ══ MAIN ═══════════════════════════════════════ -->
<div id="main-screen">
  <div class="adm-hdr">
    <div class="adm-hdr-l">
      <span class="adm-kb">KB</span>
      <span class="adm-title">ADMIN</span>
    </div>
    <div class="adm-hdr-r">
      <div class="live-pill"><span class="live-dot"></span>LIVE</div>
      <button class="hdr-logout" onclick="doLogout()">ውጣ</button>
    </div>
  </div>

  <div class="adm-tabs">
    <div class="adm-tab active" id="tab-overview"    onclick="switchTab('overview')">
      <span class="tab-icon">📊</span>Overview
    </div>
    <div class="adm-tab" id="tab-deposits"    onclick="switchTab('deposits')">
      <span class="tab-icon">💰</span>Deposits
      <span class="tab-badge" id="dep-badge" style="display:none">0</span>
    </div>
    <div class="adm-tab" id="tab-withdrawals" onclick="switchTab('withdrawals')">
      <span class="tab-icon">📤</span>Withdraw
      <span class="tab-badge" id="wit-badge" style="display:none">0</span>
    </div>
    <div class="adm-tab" id="tab-users"       onclick="switchTab('users')">
      <span class="tab-icon">👥</span>Users
    </div>

async function renderGames(){
  // FIX: only show playing + finished rooms, NOT waiting rooms
  const {data:rooms,error}=await sb.from('rooms')
    .select('*')
    .in('status',['playing','finished'])
    .order('created_at',{ascending:false})
    .limit(40);
  if(error){ document.getElementById('adm-content').innerHTML=`<div class="empty">Error: ${error.message}</div>`; return; }

  // Waiting rooms separately — only count, don't show
  const {data:waitRooms}=await sb.from('rooms').select('id,stake,player_count').eq('status','waiting');
  const waitCount=waitRooms?.length||0;

  const playing=(rooms||[]).filter(r=>r.status==='playing');
  const finished=(rooms||[]).filter(r=>r.status==='finished');

  document.getElementById('adm-content').innerHTML = `
    <!-- Waiting rooms info strip -->
    ${waitCount>0?`
    <div style="background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.15);border-radius:12px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-size:.7rem;font-weight:700;color:var(--y);">⏳ ${waitCount} Waiting Room${waitCount>1?'s':''}</div>
        <div style="font-size:.58rem;color:var(--tx3);margin-top:2px;">Players joining — not yet started</div>
      </div>
      <button class="act-btn primary" style="flex:none;width:auto;padding:7px 12px;font-size:.6rem;" onclick="clearWaitingRooms()">🧹 Clear All</button>
    </div>`:''}

    ${playing.length>0?`
    <div class="sec-lbl" style="color:var(--g);">🟢 Live Games (${playing.length}) <button class="refresh-btn" onclick="renderGames()">↻</button></div>
    <div class="card-list" style="margin-bottom:16px;">${playing.map(r=>roomCardHTML(r)).join('')}</div>`:`
    <div class="alert-banner success" style="margin-bottom:12px;"><div><div class="ab-text" style="color:var(--g);">✅ ምንም Live ጨዋታ የለም</div></div></div>`}

/* ══ ADD / DEDUCT BALANCE ════════════════════════ */
function openAddBalance(userId, name, balance){
  modalUser={id:userId,name,balance};
  document.getElementById('modal-uname').textContent=name;
  document.getElementById('modal-ubal').textContent='ቀሪ ሂሳብ: '+fmt(balance)+' ETB';
  document.getElementById('modal-amount').value='';
  document.getElementById('modal-note').value='Manual deposit confirmed';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); modalUser=null; }

async function confirmAddBalance(){
  if(!modalUser) return;
  const amt=parseFloat(document.getElementById('modal-amount').value);
  const note=document.getElementById('modal-note').value||'Admin credit';
  if(!amt||amt<=0){ showToast('⚠️ መጠን ያስገቡ'); return; }
  const {data:user}=await sb.from('users').select('balance').eq('id',modalUser.id).single();
  const newBal=(user?.balance||0)+amt;
  const {error}=await sb.from('users').update({balance:newBal}).eq('id',modalUser.id);
  if(error){ showToast('❌ '+error.message); return; }
  await sb.from('transactions').insert({user_id:modalUser.id,type:'dep',amount:amt,label:'Admin: '+note,status:'completed'});
  showToast('✅ +'+amt+' ETB → '+modalUser.name);
  closeModal(); renderUsers();
}

function openDeductBalance(userId, name, balance){
  deductModalUser={id:userId,name,balance};
  document.getElementById('deduct-uname').textContent=name;
  document.getElementById('deduct-ubal').textContent='ቀሪ ሂሳብ: '+fmt(balance)+' ETB';
  document.getElementById('deduct-amount').value='';
  document.getElementById('deduct-note').value='Admin deduction';
  document.getElementById('deduct-modal-overlay').style.display='flex';
}
function closeDeductModal(){ document.getElementById('deduct-modal-overlay').style.display='none'; deductModalUser=null; }

async function confirmDeductBalance(){
  if(!deductModalUser) return;
  const amt=parseFloat(document.getElementById('deduct-amount').value);
  const note=document.getElementById('deduct-note').value||'Admin deduction';
  if(!amt||amt<=0){ showToast('⚠️ መጠን ያስገቡ'); return; }
  if(amt>deductModalUser.balance){ showToast('⚠️ ከሂሳቡ በላይ ነው'); return; }
  const newBal=deductModalUser.balance-amt;
  const {error}=await sb.from('users').update({balance:newBal}).eq('id',deductModalUser.id);
  if(error){ showToast('❌ '+error.message); return; }
  await sb.from('transactions').insert({user_id:deductModalUser.id,type:'wit',amount:-amt,label:'Admin: '+note,status:'completed'});
  showToast('✅ -'+amt+' ETB from '+deductModalUser.name);
  closeDeductModal(); renderUsers();
}

/* ══ CONFIRM MODAL ═══════════════════════════════ */
function showConfirm(icon, title, msg, cb, type='warn'){
  document.getElementById('confirm-icon').textContent=icon;
  document.getElementById('confirm-title').textContent=title;
  document.getElementById('confirm-msg').textContent=msg;
  const btn=document.getElementById('confirm-ok-btn');
  btn.className='act-btn '+(type==='danger'?'danger':'approve');
  btn.textContent=type==='danger'?'አዎ፣ ሰርዝ':'አዎ፣ ቀጥል';
  _confirmCb=cb;
  document.getElementById('confirm-overlay').style.display='flex';
}
function closeConfirm(){ document.getElementById('confirm-overlay').style.display='none'; _confirmCb=null; }
document.getElementById('confirm-ok-btn').onclick=async()=>{ closeConfirm(); if(_confirmCb) await _confirmCb(); };

/* ══ HELPERS ═════════════════════════════════════ */
function recentTxHTML(t){
  const icons={dep:'💰',wit:'📤',win:'🏆',bet:'🎲',bon:'🎁'};
  const plus=t.amount>0;
  const date=t.created_at?new Date(t.created_at).toLocaleString('en',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
  const sc=t.status==='completed'?'var(--g)':t.status==='pending'?'var(--y)':'var(--r)';
  return `<div class="adm-card" style="padding:10px 12px;">
    <div class="adm-card-row">
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:1rem;">${icons[t.type]||'❓'}</span>
        <div>
          <div style="font-size:.72rem;font-weight:700;">${t.label||t.type}</div>
          <div style="font-size:.55rem;color:var(--tx2);">${date}</div>
        </div>
      </div>
      <div style="text-align:right;">
        <div class="adm-card-amt ${plus?'plus':'minus'}">${plus?'+':''}${(t.amount||0).toLocaleString()} ETB</div>
        <div style="font-size:.5rem;color:${sc};font-weight:700;margin-top:2px;">${t.status||''}</div>
      </div>
    </div>
  </div>`;
}

function fmt(n){ return (n||0).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

async function updateBadges(){
  const {data}=await sb.from('transactions').select('type,status').in('status',['pending']);
  const pw=(data||[]).filter(t=>t.type==='wit').length;
  const pd=(data||[]).filter(t=>t.type==='dep').length;
  const wb=document.getElementById('wit-badge'),db=document.getElementById('dep-badge');
  if(wb){wb.textContent=pw;wb.style.display=pw>0?'inline-block':'none';}
  if(db){db.textContent=pd;db.style.display=pd>0?'inline-block':'none';}
}

function startAutoRefresh(){
  setInterval(()=>{
    if(['overview','withdrawals','deposits'].includes(currentTab)) loadTab(currentTab);
    updateBadges();
  }, 30000);
}
</script>
